<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 🧸💗</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  overflow: hidden;
  height: 100vh;
}

/* FULL BACKGROUND FIX */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: url("IMG_3907.jpeg") no-repeat center center/cover;
  filter: blur(7px) brightness(0.4);
  z-index: -1;
}

/* PAGES */
.container {
  padding: 40px;
  opacity: 0;
  transition: opacity 1s ease;
}

.show {
  opacity: 1;
}

/* INPUT */
input {
  padding: 14px;
  border-radius: 15px;
  border: none;
  text-align: center;
  font-size: 16px;
}

/* TEXT */
h2 {
  font-size: 28px;
}

p {
  font-size: 22px;
  line-height: 1.8;
}

/* TAP */
.tap {
  position: fixed;
  bottom: 20px;
  width: 100%;
  opacity: 0.6;
  font-size: 14px;
}

/* CURSOR */
#cursor {
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,100%{opacity:1;}
  50%{opacity:0;}
}

/* GLOW */
.glow {
  animation: glow 2s ease forwards;
}

@keyframes glow {
  100% {text-shadow: 0 0 20px pink;}
}

/* SHAKE */
@keyframes shake {
  0% {transform: translateX(0);}
  25% {transform: translateX(-10px);}
  50% {transform: translateX(10px);}
  75% {transform: translateX(-10px);}
  100% {transform: translateX(0);}
}
.shake { animation: shake 0.4s; }

/* HEARTS */
.heart {
  position: fixed;
  animation: float 6s linear infinite;
}

@keyframes float {
  from {transform: translateY(100vh);}
  to {transform: translateY(-10vh);}
}

/* SLIDESHOW CENTER */
.slide {
  display: none;
  width: 300px;
  border-radius: 20px;
  margin: auto;
}

.active {
  display: block;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container show" id="start">
  <h1>For You 🧸💗</h1>
  <p class="tap">tap to begin</p>
</div>

<div class="container" id="codeScreen">
  <h2>Enter our code 💗</h2>
  <p style="opacity:0.6;">hint: when we started dating…</p>
  <input type="password" id="codeInput">
</div>

<div class="container" id="countdown">
  <h2>We've been together for 💗</h2>
  <p id="time"></p>
  <p class="tap">tap to continue</p>
</div>

<!-- MESSAGE (EMPTY READY FOR YOUR TEXT) -->
<div class="container" id="message">
  <h2>💌</h2>

  <p id="typedText" style="max-width:800px; margin:auto; font-size:22px;"></p>

  <p class="tap" id="tapAfterMessage" style="display:none;">tap to continue</p>
</div>

<!-- SLIDESHOW -->
<div class="container" id="gallery">
  <h2>Us 💗</h2>

  <img class="slide active" src="IMG_3908.jpeg">
  <img class="slide" src="IMG_3909.jpeg">
  <img class="slide" src="IMG_3910.jpeg">
  <img class="slide" src="IMG_3912.jpeg">
  <img class="slide" src="IMG_3913.jpeg">
  <img class="slide" src="IMG_3926.jpeg">
  <img class="slide" src="IMG_3927.jpeg">
  <img class="slide" src="IMG_3928.jpeg">

  <p class="tap">tap for final surprise</p>
</div>

<!-- PLAYLIST -->
<div class="container" id="playlist">
  <h2>Our Playlist 🎶</h2>

  <iframe style="border-radius:12px"
    src="https://open.spotify.com/embed/playlist/5pMJjbRnQiTY3k4cPpTSF2"
    width="100%" height="380"
    frameBorder="0"
    allow="autoplay; encrypted-media">
  </iframe>

  <p class="glow">Forever us 💗</p>
</div>

<script>
let current = "start";

/* MUSIC FADE */
function playMusic() {
  let music = document.getElementById("music");
  music.volume = 0;
  music.play();

  let v = 0;
  let fade = setInterval(() => {
    if (v < 1) {
      v += 0.05;
      music.volume = v;
    } else clearInterval(fade);
  }, 200);
}

/* NAVIGATION */
function goTo(id) {
  document.getElementById(current).classList.remove("show");

  setTimeout(() => {
    document.getElementById(id).classList.add("show");
    current = id;

    if (id === "message") startTyping();
    if (id === "gallery") startSlideshow();
  }, 500);
}

/* TAP FLOW */
document.body.addEventListener("click", () => {
  if (current === "start") {
    playMusic();
    goTo("codeScreen");
  }
  else if (current === "countdown") goTo("message");
  else if (current === "gallery") goTo("playlist");
  else if (current === "message" && typingDone) goTo("gallery");
});

/* PASSWORD */
document.getElementById("codeInput").addEventListener("keypress", function(e){
  if (e.key === "Enter") {
    if (this.value === "18thmarch") {
      goTo("countdown");
    } else {
      document.body.classList.add("shake");
      setTimeout(() => document.body.classList.remove("shake"), 400);
    }
  }
});

/* COUNTDOWN */
let startDate = new Date("March 18, 2026");

setInterval(() => {
  let diff = new Date() - startDate;
  let d = Math.floor(diff / 86400000);
  let h = Math.floor((diff / 3600000) % 24);
  let m = Math.floor((diff / 60000) % 60);

  document.getElementById("time").innerHTML =
    d + " days, " + h + " hrs, " + m + " mins 💗";
}, 1000);

/* TYPING (PASTE YOUR MESSAGE HERE) */
const text = `Dear bear🧸💗,
i really don’t know how to even start😭 but i love love you soooooo muchhhhhhh. I love when you’re happy, i love your eyes, your smile, your laughter, i love your height, i love every single thing about you. i love how you feel sometimes feel a bit awkward and you feel like i wouldn’t understand you but it makes you the cutest honestly and i tell you to not be shy🙃… i love how smart you are! and i am going to love every single moment of yours, your happy times as well as your sad times but i pray and hope you’re happy all the time🥹🥹🥹💗… i’m actually allowing myself to be loved and i’m going to love you through and through!💗💗 you may not know but you make me really happy and sometimes i think this is not real and im going to love you always Nana Wiredu Gyan🥹💗 and i know we’ll last forever 🙃🙃💗 It's so rare to find a someone like you, somehow when you're around,the sky is always blue,the way we talk, the things you say the way you make it all okay and how you know all of my jokes but  you laugh anyway… if I could wish for one thing I'd take the smile that you bring
Wherever you go in this world I'll come along
Together we dream the same dream
Forever I'm here for you, you're here for me
Happy One Month Anniversary!!💗`;

let i = 0;
let typingDone = false;
let sound = new Audio("typing.mp3");

function startTyping() {
  let el = document.getElementById("typedText");
  let tap = document.getElementById("tapAfterMessage");

  el.innerHTML = "";
  i = 0;
  typingDone = false;

  function type() {
    if (i < text.length) {
      sound.currentTime = 0;
      sound.play();

      el.innerHTML = text.substring(0, i + 1) + '<span id="cursor">|</span>';
      i++;
      setTimeout(type, 15);
    } else {
      typingDone = true;
      tap.style.display = "block";
    }
  }

  type();
}

/* HEARTS */
setInterval(() => {
  let h = document.createElement("div");
  h.innerHTML = "💗";
  h.classList.add("heart");
  h.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 6000);
}, 500);

/* SLIDESHOW */
let slideIndex = 0;

function startSlideshow() {
  let slides = document.querySelectorAll(".slide");

  setInterval(() => {
    slides.forEach(s => s.classList.remove("active"));
    slideIndex = (slideIndex + 1) % slides.length;
    slides[slideIndex].classList.add("active");
  }, 2000);
}
</script>

</body>
</html>
