<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 🧸💗</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  color: white;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("IMG_3907.jpeg") center/cover no-repeat;
  filter: blur(6px) brightness(0.35);
  transform: scale(1.05);
  z-index: -1;
}

/* PAGE */
.container {
  position: absolute;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 30px;
}

.show {
  display: flex;
}

/* TEXT */
h1, h2, p {
  text-shadow: 0 2px 10px black;
}

p { font-size: 20px; max-width: 700px; }

/* BUTTON */
button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  margin-top: 20px;
  cursor: pointer;
}

/* INPUT */
input {
  padding: 15px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  text-align: center;
}

/* SLIDESHOW */
.slide {
  display: none;
  width: 300px;
  height: 300px;
  object-fit: cover;
  border-radius: 20px;
}
.active { display: block; }

#cursor { animation: blink 1s infinite; }
@keyframes blink { 50% {opacity:0;} }
</style>
</head>

<body>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- START -->
<div class="container show" id="start">
  <h1>For You 🧸💗</h1>
  <button onclick="start()">Start 💗</button>
</div>

<!-- CODE -->
<div class="container" id="codeScreen">
  <h2>Enter our code 💗</h2>
  <p style="opacity:0.7;">hint: when we started dating…</p>
  <input type="password" id="codeInput" placeholder="type here">
</div>

<!-- COUNTDOWN -->
<div class="container" id="countdown">
  <h2>We've been together for 💗</h2>
  <p id="time"></p>
  <button onclick="goTo('message')">Next 💗</button>
</div>

<!-- MESSAGE -->
<div class="container" id="message">
  <h2>💌</h2>
  <p id="typedText"></p>
  <button onclick="goTo('gallery')">Next 💗</button>
</div>

<!-- GALLERY -->
<div class="container" id="gallery">
  <h2>Us 💗</h2>
  <img class="slide active" src="IMG_3908.jpeg">
  <img class="slide" src="IMG_3909.jpeg">
  <img class="slide" src="IMG_3910.jpeg">
  <img class="slide" src="IMG_3912.jpeg">
  <img class="slide" src="IMG_3913.jpeg">
  <img class="slide" src="IMG_3926.jpeg">
  <img class="slide" src="IMG_3927.jpeg">
  <img class="slide" src="IMG_3928.jpeg">
  <button onclick="goTo('playlist')">Final 💗</button>
</div>

<!-- PLAYLIST -->
<div class="container" id="playlist">
  <h2>Our Playlist 🎶</h2>
  <iframe style="border-radius:12px"
    src="https://open.spotify.com/embed/playlist/5pMJjbRnQiTY3k4cPpTSF2"
    width="90%" height="380"
    frameBorder="0"
    allow="autoplay; encrypted-media">
  </iframe>
</div>

<script>
let current = "start";

function start() {
  document.getElementById("music").play();
  goTo("codeScreen");
}

function goTo(id) {
  document.getElementById(current).classList.remove("show");
  document.getElementById(id).classList.add("show");
  current = id;

  if (id === "message") startTyping();
  if (id === "gallery") startSlideshow();
}

/* PASSWORD — SIMPLE + RELIABLE */
document.getElementById("codeInput").addEventListener("input", function() {
  if (this.value.toLowerCase().trim() === "18thmarch") {
    goTo("countdown");
  }
});

/* COUNTDOWN */
let startDate = new Date("March 18, 2026");
setInterval(() => {
  let d = Math.floor((new Date() - startDate)/86400000);
  document.getElementById("time").innerHTML = d + " days 💗";
}, 1000);

/* TYPING */
const text = `Dear bear🧸💗,
i really don’t know how to even start😭 
but i love love you soooooo muchhhhhhh. 
I love when you’re happy, i love your eyes, 
your smile, your laughter, i love your height, 
i love every single thing about you. 
i love how you feel sometimes feel a bit awkward and 
you feel like i wouldn’t understand you but it makes 
you the cutest honestly and i tell you to not be shy🙃… 
i love how smart you are! and i am going to love every 
single moment of yours, your happy times as well as your 
sad times but i pray and hope you’re happy all the time🥹🥹🥹💗… 
i’m actually allowing myself to be loved and i’m going to love you 
through and through!💗💗 you may not know but you make me really 
happy and sometimes i think this is not real and im going to love you 
always Nana Wiredu Gyan🥹💗 and i know we’ll last forever 🙃🙃💗 
It's so rare to find a someone like you, somehow when you're around,
the sky is always blue,the way we talk, the things you say the way 
you make it all okay and how you know all of my jokes but  you laugh anyway… 
if I could wish for one thing I'd take the smile that you bring
Wherever you go in this world I'll come along
Together we dream the same dream
Forever I'm here for you, you're here for me
Happy One Month Anniversary!!💗`;
let i = 0;
let sound = new Audio("typing.mp3");

function startTyping() {
  let el = document.getElementById("typedText");
  el.innerHTML = "";
  i = 0;

  function type() {
    if (i < text.length) {
      sound.currentTime = 0;
      sound.play();
      el.innerHTML = text.substring(0, i + 1) + '<span id="cursor">|</span>';
      i++;
      setTimeout(type, 15);
    }
  }
  type();
}

/* SLIDESHOW */
function startSlideshow() {
  let slides = document.querySelectorAll(".slide");
  let i = 0;

  setInterval(() => {
    slides.forEach(s => s.classList.remove("active"));
    i = (i + 1) % slides.length;
    slides[i].classList.add("active");
  }, 2000);
}
</script>

</body>
</html>
