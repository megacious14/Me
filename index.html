<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 🧸💗</title>

<style>
/* RESET */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

/* ✅ FULL SCREEN BACKGROUND FIX (REAL FIX) */
body {
  background: black;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("IMG_3907.jpeg") no-repeat center center / cover;
  filter: blur(6px) brightness(0.35);
  transform: scale(1.05);
  z-index: -1;
}

/* PAGE */
.container {
  position: absolute;
  width: 100%;
  height: 100%;
  padding: 40px;
  box-sizing: border-box;
  opacity: 0;
  transition: opacity 0.8s ease;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.show {
  opacity: 1;
}

/* 🔤 MAKE TEXT CLEAR */
h1, h2, p {
  text-shadow: 0 2px 10px black;
}

h2 {
  font-size: 32px;
}

p {
  font-size: 22px;
  max-width: 800px;
  line-height: 1.8;
}

/* INPUT */
input {
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  text-align: center;
}

/* TAP */
.tap {
  position: absolute;
  bottom: 20px;
  opacity: 0.6;
  font-size: 14px;
}

/* HEARTS */
.heart {
  position: fixed;
  animation: float 6s linear infinite;
}

@keyframes float {
  from {transform: translateY(100vh);}
  to {transform: translateY(-10vh);}
}

/* SHAKE */
@keyframes shake {
  0% {transform: translateX(0);}
  25% {transform: translateX(-10px);}
  50% {transform: translateX(10px);}
  75% {transform: translateX(-10px);}
  100% {transform: translateX(0);}
}
.shake { animation: shake 0.4s; }

/* CURSOR */
#cursor {
  animation: blink 1s infinite;
}

@keyframes blink {
  50% {opacity: 0;}
}

/* 🎞️ SLIDESHOW FIX */
.slide {
  display: none;
  width: 320px;
  height: 320px;
  object-fit: cover;
  border-radius: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

.active {
  display: block;
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- START -->
<div class="container show" id="start">
  <h1>For You 🧸💗</h1>
  <p class="tap">tap to begin</p>
</div>

<!-- CODE -->
<div class="container" id="codeScreen">
  <h2>Enter our code 💗</h2>
  <p style="opacity:0.7;">hint: when we started dating…</p>
  <input type="password" id="codeInput">
</div>

<!-- COUNTDOWN -->
<div class="container" id="countdown">
  <h2>We've been together for 💗</h2>
  <p id="time"></p>
  <p class="tap">tap to continue</p>
</div>

<!-- MESSAGE -->
<div class="container" id="message">
  <h2>💌</h2>
  <p id="typedText"></p>
</div>

<!-- SLIDESHOW (FIXED) -->
<div class="container" id="gallery">
  <h2>Us 💗</h2>

  <img class="slide active" src="IMG_3908.jpeg">
  <img class="slide" src="IMG_3909.jpeg">
  <img class="slide" src="IMG_3910.jpeg">
  <img class="slide" src="IMG_3912.jpeg">
  <img class="slide" src="IMG_3913.jpeg">
  <img class="slide" src="IMG_3926.jpeg">
  <img class="slide" src="IMG_3927.jpeg">
  <img class="slide" src="IMG_3928.jpeg">

  <p class="tap">tap for final surprise</p>
</div>

<!-- PLAYLIST -->
<div class="container" id="playlist">
  <h2>Our Playlist 🎶</h2>

  <iframe style="border-radius:12px"
    src="https://open.spotify.com/embed/playlist/5pMJjbRnQiTY3k4cPpTSF2"
    width="90%" height="380"
    frameBorder="0"
    allow="autoplay; encrypted-media">
  </iframe>

  <p>Forever us 💗</p>
</div>

<script>
let current = "start";

/* MUSIC */
function playMusic() {
  let m = document.getElementById("music");
  m.volume = 0;
  m.play();

  let v = 0;
  let fade = setInterval(() => {
    if (v < 1) {
      v += 0.05;
      m.volume = v;
    } else clearInterval(fade);
  }, 200);
}

/* NAV */
function goTo(id) {
  document.getElementById(current).classList.remove("show");

  setTimeout(() => {
    document.getElementById(id).classList.add("show");
    current = id;

    if (id === "message") startTyping();
    if (id === "gallery") startSlideshow();
  }, 500);
}

/* TAP FLOW */
document.body.addEventListener("click", () => {
  if (current === "start") {
    playMusic();
    goTo("codeScreen");
  }
  document.getElementById("codeInput").addEventListener("input", function() {
  let value = this.value.toLowerCase().trim();

  if (value === "18thmarch") {
    goTo("countdown");
});
  else if (current === "countdown") goTo("message");
  else if (current === "message") goTo("gallery");
  else if (current === "gallery") goTo("playlist");
});

/* COUNTDOWN */
let startDate = new Date("March 18, 2026");

setInterval(() => {
  let d = Math.floor((new Date() - startDate) / 86400000);
  document.getElementById("time").innerHTML = d + " days 💗";
}, 1000);

/* TYPING */
const text = `Dear bear🧸💗,
i really don’t know how to even start😭 but i love love you soooooo 
muchhhhhhh. I love when you’re happy, i love your eyes, your smile, 
your laughter,
i love your height, i love every single thing about you. 
i love how you feel sometimes feel a bit awkward and you feel like 
i wouldn’t understand you but it makes you the cutest honestly 
and i tell you to not be shy🙃… i love how smart you are! and 
i am going to love every single moment of yours, your happy 
times as well as your sad times but i pray and hope you’re happy 
all the 
time🥹🥹🥹💗… i’m actually allowing myself to be loved and 
i’m going to love you 
through and through!💗💗 you may not know but you make me really 
happy and sometimes 
i think this is not real and im going to love you always Nana Wiredu Gyan🥹💗 and 
i know we’ll 
last forever 🙃🙃💗 It's so rare to find a someone like you, somehow when you're
around,the 
sky is always blue,the way we talk, the things you say the way you make it 
all okay and how you 
know all of my jokes but  you laugh anyway… if I could wish for one thing I'd take 
the smile 
that you bring
Wherever you go in this world I'll come along
Together we dream the same dream
Forever I'm here for you, you're here for me
Happy One Month Anniversary!!💗`;

let i = 0;
let sound = new Audio("typing.mp3");
let typingDone = false;

function startTyping() {
  let el = document.getElementById("typedText");
  el.innerHTML = "";
  i = 0;

  function type() {
    if (i < text.length) {
      sound.currentTime = 0;
      sound.play();

      el.innerHTML = text.substring(0, i + 1) + '<span id="cursor">|</span>';
      i++;
      setTimeout(type, 18);
    } else {
      typingDone = true;
    }
  }

  type();
}

/* SLIDESHOW FIX */
function startSlideshow() {
  let slides = document.querySelectorAll(".slide");
  let index = 0;

  setInterval(() => {
    slides.forEach(s => s.classList.remove("active"));
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
  }, 2000);
}

/* HEARTS */
setInterval(() => {
  let h = document.createElement("div");
  h.innerHTML = "💗";
  h.classList.add("heart");
  h.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 6000);
}, 500);
</script>

</body>
</html>
